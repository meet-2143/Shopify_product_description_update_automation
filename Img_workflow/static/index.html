<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search - Shopify Product Update</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 1rem;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 0.75rem;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .search-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .search-box input {
            flex: 1;
        }

        .search-box .btn-primary {
            width: auto;
            min-width: 200px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
        }

        .stat-item:last-child .stat-value {
            color: var(--success);
        }

        /* Image Grid Section */
        #result-section {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }

        .layout-wrapper {
            display: flex;
            gap: 2rem;
            margin-top: 1.5rem;
            align-items: flex-start;
        }

        .image-grid-column {
            flex: 1;
        }

        .preview-column {
            width: 400px;
            position: sticky;
            top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        .grid-item {
            background: rgba(15, 23, 42, 0.3);
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
        }

        .preview-overlay {
            position: absolute;
            inset: 0.5rem;
            background: rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(1px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 0.75rem;
            pointer-events: none;
        }

        /* Sidebar Big Preview Box */
        .big-preview-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-preview-box.empty {
            border-style: dashed;
            opacity: 0.5;
        }

        .big-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 1rem;
        }

        @media (max-width: 1100px) {
            .layout-wrapper {
                flex-direction: column;
            }
            .preview-column {
                width: 100%;
                position: relative;
                top: 0;
                order: -1;
            }
            .big-preview-box {
                aspect-ratio: 16/9;
                height: auto;
            }
        }

        .grid-item:hover .preview-overlay {
            opacity: 1;
        }

        .preview-icon {
            background: white;
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            font-size: 1.2rem;
            transform: translateY(10px);
            transition: transform 0.3s ease;
        }

        .grid-item:hover .preview-icon {
            transform: translateY(0);
        }

        .grid-item.selected {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .grid-item.selected::after {
            content: '✓';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--primary);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .shimmer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .btn-load-more {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--glass-border);
            margin: 1rem auto;
            width: auto;
            min-width: 200px;
        }

        .btn-load-more:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
            width: 100%;
            margin-top: 1.5rem;
            padding: 1.25rem;
            font-size: 1.1rem;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #toast.show { transform: translateY(0); }

        .footer {
            margin-top: auto;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 2rem 0;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Product Image Search</h1>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Generated</span>
                    <span id="total-gen" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Approved</span>
                    <span id="total-app" class="stat-value">0</span>
                </div>
            </div>
        </header>

        <div class="search-box">
            <input type="text" id="product_name" placeholder="Enter product name (e.g. Master Makki Roti)">
            <button id="btn-search" class="btn-primary">
                <span id="search-text">Search Images</span>
            </button>
        </div>

        <div id="result-section">
            <div id="product-info" style="text-align: center; margin-bottom: 2rem;">
                <div id="found-title" style="font-weight: 600; color: var(--primary); font-size: 1.2rem;"></div>
                <div id="found-id" style="font-size: 0.85rem; color: var(--text-muted);">ID: <span id="display-id"></span></div>
            </div>

            <div class="layout-wrapper">
                <div class="image-grid-column">
                    <div class="image-grid" id="image-grid">
                        <!-- Images will be injected here -->
                    </div>

                    <button id="btn-load-more" class="btn-load-more" style="display: none;">
                        Load More Images
                    </button>
                </div>

                <div class="preview-column">
                    <div id="bigPreviewBox" class="big-preview-box empty">
                        <img id="bigPreviewImg" src="" alt="Preview" style="display: none;">
                        <div id="previewPlaceholder" style="color: var(--text-muted); text-align: center;">
                            Hover over an image<br>to preview
                        </div>
                    </div>

                    <button id="btn-approve" class="btn-success" disabled>
                        Approve &amp; Update Shopify
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">
        <span id="toast-msg"></span>
    </div>

    <footer class="footer">
        Powered by SerpApi &bull; Apna Indian Bazaar Suite
    </footer>

    <script>
        let currentState = {
            images: [],
            selectedImage: null,
            productId: null,
            productName: '',
            currentStart: 0,
            searchQuery: ''
        };

        const elements = {
            productName: document.getElementById('product_name'),
            btnSearch: document.getElementById('btn-search'),
            searchText: document.getElementById('search-text'),
            resultSection: document.getElementById('result-section'),
            imageGrid: document.getElementById('image-grid'),
            btnLoadMore: document.getElementById('btn-load-more'),
            foundTitle: document.getElementById('found-title'),
            displayId: document.getElementById('display-id'),
            btnApprove: document.getElementById('btn-approve'),
                bigPreviewBox: document.getElementById('bigPreviewBox'),
                bigPreviewImg: document.getElementById('bigPreviewImg'),
                previewPlaceholder: document.getElementById('previewPlaceholder'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            totalGen: document.getElementById('total-gen'),
            totalApp: document.getElementById('total-app')
        };

        function showToast(message, type = 'success') {
            elements.toastMsg.innerText = message;
            elements.toast.style.borderColor = type === 'success' ? 'var(--success)' : 'var(--error)';
            elements.toast.classList.add('show');
            setTimeout(() => elements.toast.classList.remove('show'), 3000);
        }

        async function fetchInitialStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                elements.totalGen.innerText = data.total_generated;
                elements.totalApp.innerText = data.total_approved;
            } catch (e) {}
        }
        fetchInitialStats();

        function selectImage(url, element) {
            currentState.selectedImage = url;
            
            // UI Update
            document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            
            elements.btnApprove.disabled = false;
        }

        function renderImages(images, append = false) {
            if (!append) elements.imageGrid.innerHTML = '';
            
            images.forEach(url => {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.onclick = () => selectImage(url, item);
                
                // Big Preview Logic on Hover (Sidebar)
                item.onmouseenter = () => {
                    elements.bigPreviewImg.src = url;
                    elements.bigPreviewImg.style.display = 'block';
                    elements.previewPlaceholder.style.display = 'none';
                    elements.bigPreviewBox.classList.remove('empty');
                };
                
                // Keep the last hovered image visible, or clear on mouseleave
                // User said "in the side section as before", which usually stays visible or resets.
                // I'll keep the last hovered one.
                
                const img = document.createElement('img');
                img.src = url;
                img.loading = 'lazy';
                
                const shimmer = document.createElement('div');
                shimmer.className = 'shimmer';
                
                const overlay = document.createElement('div');
                overlay.className = 'preview-overlay';
                overlay.innerHTML = '<div class="preview-icon">🔍</div>';
                
                item.appendChild(shimmer);
                item.appendChild(img);
                item.appendChild(overlay);
                
                img.onload = () => shimmer.remove();
                img.onerror = () => item.remove(); // Remove failed images
                
                elements.imageGrid.appendChild(item);
            });

            if (images.length === 20) {
                elements.btnLoadMore.style.display = 'flex';
            } else {
                elements.btnLoadMore.style.display = 'none';
            }
        }

        elements.btnSearch.onclick = async () => {
            const name = elements.productName.value.trim();
            if (!name) return showToast('Please enter a product name', 'error');

            elements.btnSearch.disabled = true;
            elements.searchText.innerText = 'Searching...';
            elements.resultSection.style.display = 'none';
            elements.btnApprove.disabled = true;
            currentState.currentStart = 0;
            currentState.selectedImage = null;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_name: name, start: 0 })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Search failed');

                currentState.productId = data.product_id;
                currentState.productName = data.title;
                currentState.searchQuery = data.search_query;
                
                elements.foundTitle.innerText = data.title;
                elements.displayId.innerText = data.product_id || 'NOT FOUND';

                // Display first 20
                renderImages(data.images.slice(0, 20));
                currentState.images = data.images;
                
                elements.resultSection.style.display = 'flex';
                elements.totalGen.innerText = data.stats.total_generated;
                showToast('Search results ready!');
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                elements.btnSearch.disabled = false;
                elements.searchText.innerText = 'Search Images';
            }
        };

        elements.btnLoadMore.onclick = async () => {
            elements.btnLoadMore.disabled = true;
            elements.btnLoadMore.innerText = 'Loading...';
            
            currentState.currentStart += 20;

            try {
                // Check if we already have more images in the local buffer (since SerpApi returns 100)
                if (currentState.images.length > currentState.currentStart) {
                    const nextBatch = currentState.images.slice(currentState.currentStart, currentState.currentStart + 20);
                    renderImages(nextBatch, true);
                } else {
                    // Need to fetch from API
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            product_name: elements.productName.value.trim(), 
                            start: currentState.currentStart 
                        })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || 'Failed to load more');

                    currentState.images = currentState.images.concat(data.images);
                    renderImages(data.images.slice(0, 20), true);
                }
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                elements.btnLoadMore.disabled = false;
                elements.btnLoadMore.innerText = 'Load More Images';
            }
        };

        elements.btnApprove.onclick = async () => {
            if (!currentState.productId) return showToast('No product ID found!', 'error');
            if (!currentState.selectedImage) return showToast('Please select an image', 'error');

            elements.btnApprove.disabled = true;
            elements.btnApprove.innerText = 'Updating Shopify...';

            const payload = {
                product_id: currentState.productId,
                product_name: currentState.productName,
                image_url: currentState.selectedImage,
                is_base64: false
            };

            try {
                const response = await fetch('/api/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Update failed');

                showToast('Shopify updated successfully!');
                elements.totalApp.innerText = data.stats.total_approved;
                
                setTimeout(() => {
                    window.location.reload();
                }, 2000);
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                elements.btnApprove.disabled = false;
                elements.btnApprove.innerText = 'Approve & Update Shopify';
            }
        };
    </script>
</body>
</html>
